[marketplace]
name = "skillsmith-marketplace"
owner = { name = "Dakota" }

[categories]
allowed = ["engineering", "productivity", "misc"]

# Groupings assemble skills/agents/hooks/mcp into installable plugins.
# A skill belongs to exactly one plugin.
[[plugin]]
name = "productivity-tools"
version = "0.1.0"
description = "Work discipline: handoffs, transitions, work-item definition, issue triage"
skills = ["cold-read", "define-work-items", "handoff", "issue-triage"]
agents = ["cold-reader"]

[[plugin]]
name = "epistemics"
version = "0.1.0"
description = "Judgment discipline: falsification passes, adversarial review, crux identification, durable research"
skills = ["deep-research", "falsification-review", "ground-truth-research", "research-note"]
agents = ["falsification-reviewer"]

[[plugin]]
name = "engineering-core"
version = "0.2.0"
description = "Engineering workflow orchestrators: specs, surveys, decisions, guided setup wizards — plus the information-architecture and doc-visuals disciplines they compose"
skills = ["architecture-spec", "codebase-survey", "discovery-map", "doc-visuals", "feature-spec", "information-architecture", "wizard"]

[[plugin]]
name = "code-craft"
version = "0.1.0"
description = "Implementation discipline: test-driven red-green loops and deep-module interface design"
skills = ["deep-modules", "tdd"]

[[plugin]]
name = "marketing"
version = "0.1.0"
description = "Marketing discipline: content scoring, outbound sequences, content angle research, podcast repurposing, and growth experiment design"
skills = ["brand-voice", "content-angles", "content-scorer", "growth-experiments", "outbound-builder", "podcast-repurposer", "seo-brief"]

[policy]
"max-skill-body-tokens" = 5000
"max-listing-chars" = 1536
"min-trigger-hit-rate" = 0.85
"security-tier" = "strict"
"network-allowlist" = []
"composition-allowlist" = [
  "architecture-spec->falsification-review",
  "discovery-map->cold-read",
  "discovery-map->define-work-items",
  "discovery-map->falsification-review",
  "discovery-map->ground-truth-research",
  "feature-spec->cold-read",
  "feature-spec->deep-modules",
]
